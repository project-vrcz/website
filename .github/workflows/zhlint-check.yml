name: ZHLint Check

on:
  push:
  pull_request:

jobs:
  zhlint-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: ZHLint Check
        run: bun run docs:zhlint
